<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading Animation Test</title>
    <link rel="stylesheet" href="styles/main.css?v=2.0.0">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            padding: 40px;
        }
        .test-controls {
            max-width: 600px;
            margin: 0 auto;
            text-align: center;
        }
        .test-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            margin: 10px;
            transition: transform 0.2s ease;
        }
        .test-btn:hover {
            transform: translateY(-2px);
        }
        .test-btn:active {
            transform: translateY(0);
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
        }
        p {
            color: #666;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>
    <div class="test-controls">
        <h1>Loading Animation Test</h1>
        <p>Click the buttons below to test the loading animation</p>
        
        <button class="test-btn" onclick="showLoading()">Show Loading</button>
        <button class="test-btn" onclick="hideLoading()">Hide Loading</button>
        <button class="test-btn" onclick="showLoadingFor3Seconds()">Show for 3 Seconds</button>
    </div>

    <script src="scripts/managers/UIManager.js"></script>
    <script>
        // Initialize UI Manager
        const uiManager = new UIManager();
        uiManager.init();

        function showLoading() {
            uiManager.showLoading();
            console.log('Show loading triggered');
        }

        function hideLoading() {
            uiManager.hideLoading();
            console.log('Hide loading triggered');
        }

        function showLoadingFor3Seconds() {
            console.log('Showing loading for 3 seconds...');
            uiManager.showLoading();
            setTimeout(() => {
                uiManager.hideLoading();
                console.log('Loading hidden after 3 seconds');
            }, 3000);
        }

        console.log('Test page loaded successfully');
        console.log('UIManager initialized:', uiManager);
    </script>
</body>
</html>
